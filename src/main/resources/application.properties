# Server Port
server.port=8081

# H2 Database Persistence for Toggle Demo
spring.datasource.url=jdbc:h2:file:./data/toggledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Togglz Settings
togglz.console.enabled=true
togglz.console.path=/togglz-console
# 💡 關鍵修正：明確告訴 Togglz 我們的 Feature 定義在哪個類別裡
togglz.feature-enums=com.luna.toggledemo.MyFeatures
